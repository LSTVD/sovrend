<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SOVREND — Threshold Crossing (Sandbox Wait State)</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,200;0,9..144,300;0,9..144,400;1,9..144,200;1,9..144,300;1,9..144,400&family=Cormorant+Garamond:ital,wght@0,400;1,300;1,400&family=DM+Sans:wght@200;300;400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --pre:#0B0D14;
  --becoming:#141820;
  --threshold:rgba(255,255,255,0.06);
  --genesis:#E8E4D8;
  --signal:rgba(232,228,216,0.55);
  --signal-dim:rgba(232,228,216,0.25);
  --signal-ghost:rgba(232,228,216,0.08);
  --moment:#FFE8A8;
  --moment-dim:rgba(255,232,168,0.4);
  --cipher:#00E5FF;
  --cipher-dim:rgba(0,229,255,0.3);
  --cipher-ghost:rgba(0,229,255,0.06);
}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--pre);color:var(--genesis);font-family:'DM Sans',sans-serif;cursor:none}

#cur{position:fixed;z-index:9999;pointer-events:none}
.cur-core{position:absolute;width:5px;height:5px;border-radius:50%;background:var(--moment);box-shadow:0 0 12px var(--moment),0 0 24px rgba(255,232,168,0.4);transform:translate(-50%,-50%)}
.cur-field{position:absolute;width:48px;height:48px;border-radius:50%;border:1px solid rgba(255,232,168,0.2);transform:translate(-50%,-50%);transition:all 0.4s cubic-bezier(0.16,1,0.3,1)}

/* CANVASES */
#matrix{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.55}
#particles{position:fixed;inset:0;z-index:1;pointer-events:none}

/* MAIN STAGE */
.stage{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;padding:0 48px}

/* HORIZON — RISES AS LAYERS COMPLETE */
.horizon-track{position:absolute;left:0;right:0;top:50%;height:1px;background:rgba(255,232,168,0.04);z-index:5}
.horizon{position:absolute;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,rgba(255,232,168,0.05) 15%,var(--moment) 50%,rgba(255,232,168,0.05) 85%,transparent 100%);box-shadow:0 0 32px rgba(255,232,168,0.4),0 0 64px rgba(255,232,168,0.2);bottom:50%;transition:bottom 1.6s cubic-bezier(0.16,1,0.3,1);z-index:6}
.horizon.l1{bottom:55%}
.horizon.l2{bottom:65%}
.horizon.l3{bottom:75%}
.horizon.l4{bottom:85%}
.horizon.l5{bottom:95%}

/* BREAK FLASH */
.flash{position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(255,232,168,0.3) 0%,transparent 60%);opacity:0;pointer-events:none;z-index:30}
.flash.fire{animation:flashOut 1.4s ease-out forwards}
@keyframes flashOut{0%{opacity:0}20%{opacity:1}100%{opacity:0}}

/* CIPHER CENTER NARRATION */
.narration{position:relative;z-index:15;text-align:center;max-width:720px;padding:48px}
.cipher-status{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.32em;text-transform:uppercase;color:var(--cipher-dim);margin-bottom:32px;display:flex;align-items:center;justify-content:center;gap:14px}
.cipher-status::before,.cipher-status::after{content:'';width:32px;height:1px;background:var(--cipher-ghost)}
.cipher-status .dot{width:6px;height:6px;border-radius:50%;background:var(--cipher);box-shadow:0 0 12px var(--cipher);animation:pulse 1.4s ease infinite}

.script{font-family:'Fraunces',serif;font-style:italic;font-size:clamp(32px,5vw,56px);font-weight:300;line-height:1.15;color:var(--genesis);margin-bottom:16px;letter-spacing:-0.02em;text-shadow:0 0 80px rgba(232,228,216,0.1);min-height:1.2em;transition:opacity 0.6s}
.script .gold{color:var(--moment);text-shadow:0 0 40px rgba(255,232,168,0.3)}

.teach{font-family:'Fraunces',serif;font-style:italic;font-size:15px;color:var(--signal);line-height:1.6;font-weight:300;min-height:1.6em;transition:opacity 0.6s}

/* LAYER PROGRESS — bottom horizontal track */
.layers{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:15}
.layer{display:flex;flex-direction:column;align-items:center;gap:8px;padding:12px 20px;border:1px solid var(--threshold);background:rgba(11,13,20,0.6);backdrop-filter:blur(8px);min-width:120px;transition:all 0.5s}
.layer.active{border-color:var(--cipher);background:rgba(0,229,255,0.04);box-shadow:0 0 24px rgba(0,229,255,0.15)}
.layer.done{border-color:var(--moment-dim);background:rgba(255,232,168,0.04);box-shadow:0 0 16px rgba(255,232,168,0.08)}
.layer-num{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.2em;color:var(--signal-dim);text-transform:uppercase}
.layer.active .layer-num,.layer.done .layer-num{color:var(--cipher)}
.layer-name{font-family:'Fraunces',serif;font-style:italic;font-size:13px;font-weight:400;color:var(--signal-dim);text-align:center}
.layer.active .layer-name{color:var(--genesis)}
.layer.done .layer-name{color:var(--moment)}
.layer-dot{width:4px;height:4px;border-radius:50%;background:var(--signal-ghost);transition:all 0.3s}
.layer.active .layer-dot{background:var(--cipher);box-shadow:0 0 8px var(--cipher);animation:pulse 1s ease infinite}
.layer.done .layer-dot{background:var(--moment);box-shadow:0 0 6px var(--moment)}

/* TOP STATUS */
.top-status{position:absolute;top:32px;left:50%;transform:translateX(-50%);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.3em;text-transform:uppercase;color:var(--signal-dim);z-index:20;display:flex;align-items:center;gap:14px}
.top-status .live{color:var(--cipher);display:flex;align-items:center;gap:6px}
.top-status .live::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--cipher);box-shadow:0 0 8px var(--cipher);animation:pulse 1.4s ease infinite}

/* CORNER BRACKETS */
.corner{position:absolute;width:48px;height:48px;pointer-events:none;z-index:5}
.corner.tl{top:32px;left:32px;border-top:1px solid rgba(0,229,255,0.18);border-left:1px solid rgba(0,229,255,0.18)}
.corner.tr{top:32px;right:32px;border-top:1px solid rgba(255,232,168,0.16);border-right:1px solid rgba(255,232,168,0.16)}
.corner.bl{bottom:32px;left:32px;border-bottom:1px solid rgba(0,229,255,0.16);border-left:1px solid rgba(0,229,255,0.16)}
.corner.br{bottom:32px;right:32px;border-bottom:1px solid rgba(255,232,168,0.14);border-right:1px solid rgba(255,232,168,0.14)}

/* BOTTOM PROMPT ECHO */
.echo{position:absolute;top:88px;left:50%;transform:translateX(-50%);font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--signal-dim);z-index:15;max-width:600px;text-align:center;font-style:italic;letter-spacing:0.06em}
.echo span{color:var(--moment)}

/* DEMO CONTROLS — hide on real impl */
.demo-bar{position:absolute;bottom:24px;right:24px;background:rgba(11,13,20,0.85);border:1px solid var(--threshold);padding:8px 12px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--signal-dim);z-index:100;letter-spacing:0.1em}
.demo-bar button{background:var(--moment);color:var(--pre);border:none;padding:4px 10px;font-family:inherit;font-size:9px;cursor:none;margin-left:8px;font-weight:500;letter-spacing:0.1em}

@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.6)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div id="cur"><div class="cur-core"></div><div class="cur-field"></div></div>
<canvas id="matrix"></canvas>
<canvas id="particles"></canvas>

<div class="top-status">
  <span>SOVREND · CIPHER WORKING</span>
  <span class="live">REACTOR ENGAGED</span>
</div>

<div class="echo">
  building → <span>Custom handcrafted billiard cues by Thornton Cues...</span>
</div>

<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>

<div class="horizon-track"></div>
<div class="horizon" id="horizon"></div>
<div class="flash" id="flash"></div>

<div class="stage">
  <div class="narration">
    <div class="cipher-status">
      <div class="dot"></div>
      Cipher is crossing the threshold
    </div>
    <div class="script" id="script">I see your <span class="gold">vision.</span></div>
    <div class="teach" id="teach">Let me bring it across.</div>
  </div>
</div>

<div class="layers">
  <div class="layer active" id="l1">
    <div class="layer-num">01</div>
    <div class="layer-name">Foundation</div>
    <div class="layer-dot"></div>
  </div>
  <div class="layer" id="l2">
    <div class="layer-num">02</div>
    <div class="layer-name">Details</div>
    <div class="layer-dot"></div>
  </div>
  <div class="layer" id="l3">
    <div class="layer-num">03</div>
    <div class="layer-name">Experience</div>
    <div class="layer-dot"></div>
  </div>
  <div class="layer" id="l4">
    <div class="layer-num">04</div>
    <div class="layer-name">Architecture</div>
    <div class="layer-dot"></div>
  </div>
  <div class="layer" id="l5">
    <div class="layer-num">05</div>
    <div class="layer-name">Philosophy</div>
    <div class="layer-dot"></div>
  </div>
</div>

<div class="demo-bar">
  THRESHOLD CROSSING DEMO <button onclick="restart()">RESTART</button>
</div>

<script>
// CURSOR
var cur=document.getElementById('cur'),core=cur.querySelector('.cur-core'),field=cur.querySelector('.cur-field')
var mx=innerWidth/2,my=innerHeight/2,rx=mx,ry=my
document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;core.style.left=mx+'px';core.style.top=my+'px'})
function lerp(){rx+=(mx-rx)*0.1;ry+=(my-ry)*0.1;field.style.left=rx+'px';field.style.top=ry+'px';requestAnimationFrame(lerp)}
lerp()

// MATRIX RAIN — intensifies during build
var c=document.getElementById('matrix'),ctx=c.getContext('2d'),W,H
function rs(){W=c.width=innerWidth;H=c.height=innerHeight;initCols()}
var cols=[],fontSize=14
function initCols(){
  cols=[]
  var n=Math.floor(W/fontSize)
  for(var i=0;i<n;i++)cols.push({y:Math.random()*H*-1,speed:0.8+Math.random()*1.8})
}
rs();addEventListener('resize',rs)

var phrase = "AS A MAN THINKETH SO IS HE"
var phraseChars = phrase.split('')
var alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ"

function rndChar(){
  if(Math.random()<0.15) return phraseChars[Math.floor(Math.random()*phraseChars.length)]
  return alphabet[Math.floor(Math.random()*alphabet.length)]
}

function drawMatrix(){
  ctx.fillStyle='rgba(11,13,20,0.06)'
  ctx.fillRect(0,0,W,H)
  ctx.font=fontSize+'px "JetBrains Mono", monospace'

  cols.forEach(function(col,i){
    var x=i*fontSize
    var y=col.y
    for(var j=0;j<28;j++){
      var py=y-j*fontSize
      if(py<0||py>H)continue
      var ch=rndChar()
      if(j===0){
        ctx.fillStyle='rgba(255,232,168,0.95)'
        ctx.shadowBlur=10
        ctx.shadowColor='rgba(255,232,168,0.7)'
      } else if(j<3){
        ctx.fillStyle='rgba(0,229,255,'+(0.8-j*0.18)+')'
        ctx.shadowBlur=4
        ctx.shadowColor='rgba(0,229,255,0.5)'
      } else {
        ctx.fillStyle='rgba(0,229,255,'+Math.max(0,0.5-j*0.018)+')'
        ctx.shadowBlur=0
      }
      ctx.fillText(ch,x,py)
    }
    ctx.shadowBlur=0
    col.y+=col.speed
    if(col.y>H+fontSize*28)col.y=Math.random()*-300
  })

  requestAnimationFrame(drawMatrix)
}
drawMatrix()

// AMBIENT PARTICLES
var pc=document.getElementById('particles'),pctx=pc.getContext('2d'),parts=[]
function prs(){pc.width=innerWidth;pc.height=innerHeight}
prs();addEventListener('resize',prs)
for(var i=0;i<50;i++)parts.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,r:Math.random()*1.4+0.4,a:Math.random()*0.5+0.2})
function drawParticles(){
  pctx.clearRect(0,0,pc.width,pc.height)
  parts.forEach(function(p){
    p.x+=p.vx;p.y+=p.vy
    if(p.x<0||p.x>pc.width)p.vx*=-1
    if(p.y<0||p.y>pc.height)p.vy*=-1
    pctx.beginPath();pctx.arc(p.x,p.y,p.r,0,Math.PI*2)
    pctx.fillStyle='rgba(255,232,168,'+p.a+')'
    pctx.shadowBlur=8;pctx.shadowColor='rgba(255,232,168,0.4)'
    pctx.fill()
  })
  pctx.shadowBlur=0
  requestAnimationFrame(drawParticles)
}
drawParticles()

// THRESHOLD CROSSING SEQUENCE
var script=document.getElementById('script')
var teach=document.getElementById('teach')
var horizon=document.getElementById('horizon')
var flash=document.getElementById('flash')

var sequence = [
  { delay: 0,    layer: 1, script: 'I see your <span class="gold">vision.</span>',           teach: 'Let me bring it across.' },
  { delay: 1800, layer: 1, script: 'Setting the <span class="gold">foundation.</span>',     teach: 'Every section earns its place.' },
  { delay: 3600, layer: 2, script: 'Filling the <span class="gold">details.</span>',         teach: 'Real data. Real names. Real numbers.' },
  { delay: 5400, layer: 3, script: 'Letting it <span class="gold">breathe.</span>',          teach: 'Every interaction wired with care.' },
  { delay: 7200, layer: 4, script: 'Setting the <span class="gold">architecture.</span>',   teach: 'Color, type, rhythm — locked.' },
  { delay: 9000, layer: 5, script: 'The <span class="gold">moment of delight.</span>',      teach: 'One thing they will not forget.' },
  { delay: 10800, layer: 6, script: 'It <span class="gold">exists.</span>',                  teach: 'Your idea, made real.' },
]

var currentLayer = 1

function setLayer(n) {
  for (var i = 1; i <= 5; i++) {
    var el = document.getElementById('l' + i)
    el.classList.remove('active', 'done')
    if (i < n) el.classList.add('done')
    else if (i === n) el.classList.add('active')
  }
  horizon.className = 'horizon'
  if (n >= 2) horizon.classList.add('l' + Math.min(n - 1, 5))
}

function runSequence() {
  sequence.forEach(function(step) {
    setTimeout(function() {
      script.style.opacity = 0
      teach.style.opacity = 0
      setTimeout(function() {
        script.innerHTML = step.script
        teach.innerHTML = step.teach
        script.style.opacity = 1
        teach.style.opacity = 1
        setLayer(step.layer)
        if (step.layer === 6) {
          // Final flash + reveal
          horizon.classList.add('l5')
          setTimeout(function() {
            flash.classList.add('fire')
          }, 400)
        }
      }, 300)
    }, step.delay)
  })
}

function restart() {
  flash.classList.remove('fire')
  setLayer(1)
  script.innerHTML = 'I see your <span class="gold">vision.</span>'
  teach.innerHTML = 'Let me bring it across.'
  setTimeout(runSequence, 200)
}

runSequence()
</script>
</body>
</html>
