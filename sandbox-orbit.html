<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sandbox · Orbit</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,200;0,9..144,300;1,9..144,200;1,9..144,300;1,9..144,400&family=DM+Sans:wght@200;300&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--pre:#0B0D14;--genesis:#E8E4D8;--signal-dim:rgba(232,228,216,0.25);--moment:#FFE8A8;--cipher:#00E5FF;--threshold:rgba(255,255,255,0.06)}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--pre);color:var(--genesis);font-family:'DM Sans',sans-serif;cursor:none}

/* CENTER ORBIT SYSTEM */
.orbit-stage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.orbit{position:relative;width:480px;height:480px}

.ring{position:absolute;border-radius:50%;border:1px solid rgba(0,229,255,0.18)}
.ring.r1{inset:0;animation:spin 20s linear infinite}
.ring.r2{inset:50px;animation:spin 14s linear infinite reverse;border-color:rgba(255,232,168,0.22)}
.ring.r3{inset:100px;animation:spin 9s linear infinite;border-style:dashed;border-color:rgba(0,229,255,0.15)}
.ring.r4{inset:150px;animation:spin 6s linear infinite reverse;border-color:rgba(255,232,168,0.3)}

/* ORBITING NODES */
.node{position:absolute;width:8px;height:8px;border-radius:50%;background:var(--cipher);box-shadow:0 0 12px var(--cipher);top:-4px;left:50%;margin-left:-4px}
.r1 .node{background:var(--cipher)}
.r2 .node{background:var(--moment);box-shadow:0 0 14px var(--moment)}
.r4 .node{width:6px;height:6px;top:-3px;margin-left:-3px;background:var(--moment);box-shadow:0 0 10px var(--moment)}

/* CENTER CORE */
.core{position:absolute;inset:200px;border-radius:50%;background:radial-gradient(circle at center,rgba(255,232,168,0.15),rgba(0,229,255,0.05) 50%,transparent 80%);border:1px solid rgba(255,232,168,0.4);display:flex;align-items:center;justify-content:center;animation:corePulse 3s ease-in-out infinite;box-shadow:0 0 60px rgba(0,229,255,0.15),0 0 120px rgba(255,232,168,0.08)}
.core-dot{width:12px;height:12px;border-radius:50%;background:var(--moment);box-shadow:0 0 16px var(--moment),0 0 32px rgba(255,232,168,0.5);animation:dotPulse 1.4s ease-in-out infinite}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes corePulse{0%,100%{transform:scale(1);opacity:0.9}50%{transform:scale(1.05);opacity:1}}
@keyframes dotPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.4)}}

/* NARRATION OVERLAY */
.narration{position:absolute;bottom:160px;left:50%;transform:translateX(-50%);text-align:center;max-width:680px;padding:0 48px;z-index:15}
.cipher-status{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.32em;text-transform:uppercase;color:rgba(0,229,255,0.5);margin-bottom:18px;display:flex;align-items:center;justify-content:center;gap:14px}
.cipher-status::before,.cipher-status::after{content:'';width:24px;height:1px;background:rgba(0,229,255,0.3)}
.cipher-status .dot{width:5px;height:5px;border-radius:50%;background:var(--cipher);box-shadow:0 0 10px var(--cipher);animation:dotPulse 1.4s ease infinite}

.script{font-family:'Fraunces',serif;font-style:italic;font-size:clamp(28px,4vw,44px);font-weight:300;line-height:1.2;color:var(--genesis);margin-bottom:12px;text-shadow:0 0 60px rgba(232,228,216,0.1);min-height:1.2em;transition:opacity 0.5s}
.script .gold{color:var(--moment);text-shadow:0 0 30px rgba(255,232,168,0.4)}
.teach{font-family:'Fraunces',serif;font-style:italic;font-size:14px;color:rgba(232,228,216,0.5);min-height:1.6em;transition:opacity 0.5s}

/* TOP STATUS */
.top-status{position:absolute;top:32px;left:50%;transform:translateX(-50%);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.3em;text-transform:uppercase;color:var(--signal-dim);z-index:20;display:flex;align-items:center;gap:14px}
.top-status .live{color:var(--cipher);display:flex;align-items:center;gap:6px}
.top-status .live::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--cipher);box-shadow:0 0 8px var(--cipher);animation:dotPulse 1.4s ease infinite}

.echo{position:absolute;top:80px;left:50%;transform:translateX(-50%);font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--signal-dim);z-index:15;max-width:600px;text-align:center;font-style:italic;letter-spacing:0.06em}
.echo span{color:var(--moment)}

/* CORNERS */
.corner{position:absolute;width:48px;height:48px;pointer-events:none;z-index:5}
.corner.tl{top:32px;left:32px;border-top:1px solid rgba(0,229,255,0.18);border-left:1px solid rgba(0,229,255,0.18)}
.corner.tr{top:32px;right:32px;border-top:1px solid rgba(255,232,168,0.16);border-right:1px solid rgba(255,232,168,0.16)}
.corner.bl{bottom:32px;left:32px;border-bottom:1px solid rgba(0,229,255,0.16);border-left:1px solid rgba(0,229,255,0.16)}
.corner.br{bottom:32px;right:32px;border-bottom:1px solid rgba(255,232,168,0.14);border-right:1px solid rgba(255,232,168,0.14)}

/* DEMO BAR */
.demo{position:absolute;bottom:24px;right:24px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--signal-dim);z-index:100;letter-spacing:0.1em;background:rgba(11,13,20,0.85);border:1px solid var(--threshold);padding:8px 12px}
.demo button{background:var(--moment);color:var(--pre);border:none;padding:4px 10px;font-family:inherit;font-size:9px;cursor:none;margin-left:8px;font-weight:500;letter-spacing:0.1em}

#cur{position:fixed;z-index:9999;pointer-events:none}
.cur-core{position:absolute;width:5px;height:5px;border-radius:50%;background:var(--moment);box-shadow:0 0 12px var(--moment);transform:translate(-50%,-50%)}
.cur-field{position:absolute;width:48px;height:48px;border-radius:50%;border:1px solid rgba(255,232,168,0.2);transform:translate(-50%,-50%);transition:all 0.4s cubic-bezier(0.16,1,0.3,1)}
</style>
</head>
<body>
<div id="cur"><div class="cur-core"></div><div class="cur-field"></div></div>

<div class="top-status">
  <span>SOVREND · CIPHER WORKING</span>
  <span class="live">REACTOR ENGAGED</span>
</div>
<div class="echo">building → <span>Custom handcrafted billiard cues by Thornton Cues...</span></div>
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>

<div class="orbit-stage">
  <div class="orbit">
    <div class="ring r1"><div class="node"></div></div>
    <div class="ring r2"><div class="node"></div></div>
    <div class="ring r3"></div>
    <div class="ring r4"><div class="node"></div></div>
    <div class="core"><div class="core-dot"></div></div>
  </div>
</div>

<div class="narration">
  <div class="cipher-status"><div class="dot"></div>Cipher is crossing the threshold</div>
  <div class="script" id="script">I see your <span class="gold">vision.</span></div>
  <div class="teach" id="teach">Let me bring it across.</div>
</div>

<div class="demo">SANDBOX · ORBIT <button onclick="restart()">RESTART</button></div>

<script>
var cur=document.getElementById('cur'),core=cur.querySelector('.cur-core'),field=cur.querySelector('.cur-field')
var mx=innerWidth/2,my=innerHeight/2,rx=mx,ry=my
document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;core.style.left=mx+'px';core.style.top=my+'px'})
function lerp(){rx+=(mx-rx)*0.1;ry+=(my-ry)*0.1;field.style.left=rx+'px';field.style.top=ry+'px';requestAnimationFrame(lerp)}
lerp()

var script=document.getElementById('script'),teach=document.getElementById('teach')
var seq=[
  {d:0,s:'I see your <span class="gold">vision.</span>',t:'Let me bring it across.'},
  {d:1800,s:'Setting the <span class="gold">foundation.</span>',t:'Every section earns its place.'},
  {d:3600,s:'Filling the <span class="gold">details.</span>',t:'Real data. Real names. Real numbers.'},
  {d:5400,s:'Letting it <span class="gold">breathe.</span>',t:'Every interaction wired with care.'},
  {d:7200,s:'Setting the <span class="gold">architecture.</span>',t:'Color, type, rhythm — locked.'},
  {d:9000,s:'The <span class="gold">moment of delight.</span>',t:'One thing they will not forget.'},
  {d:10800,s:'It <span class="gold">exists.</span>',t:'Your idea, made real.'},
]
function run(){seq.forEach(function(x){setTimeout(function(){script.style.opacity=0;teach.style.opacity=0;setTimeout(function(){script.innerHTML=x.s;teach.innerHTML=x.t;script.style.opacity=1;teach.style.opacity=1},300)},x.d)})}
function restart(){script.innerHTML=seq[0].s;teach.innerHTML=seq[0].t;setTimeout(run,200)}
run()
</script>
</body>
</html>
