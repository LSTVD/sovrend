<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SOVREND — Atelier Concept</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,200;1,9..144,300;1,9..144,400&family=DM+Sans:wght@200;300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FAF7F2;
  --ink:#1a1a1a;
  --ink-soft:rgba(26,26,26,0.55);
  --ink-ghost:rgba(26,26,26,0.18);
  --line:rgba(26,26,26,0.08);
  --accent:#5C3D2E;
  --champagne:#E8D5B0;
}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--ink);cursor:none}

/* CUSTOM CURSOR */
#cur{position:fixed;z-index:9999;pointer-events:none;mix-blend-mode:multiply}
.cur-dot{position:absolute;width:6px;height:6px;border-radius:50%;background:var(--ink);transform:translate(-50%,-50%);transition:transform 0.15s}
.cur-ring{position:absolute;width:36px;height:36px;border-radius:50%;border:1px solid rgba(26,26,26,0.2);transform:translate(-50%,-50%);transition:all 0.4s cubic-bezier(0.16,1,0.3,1)}

/* LAYOUT */
.shell{display:flex;width:100%;height:100vh}
.sb{width:48px;flex-shrink:0;height:100vh;border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;padding:24px 0;background:var(--bg)}
.sb-logo{width:14px;height:14px;border:1px solid var(--ink);margin-bottom:32px;position:relative}
.sb-logo::after{content:'';position:absolute;inset:3px;background:var(--accent)}
.sb-nav{flex:1;display:flex;flex-direction:column;gap:6px;width:100%;align-items:center}
.ni{width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;color:var(--ink-ghost);transition:color 0.2s}
.ni:hover{color:var(--ink)}
.ni.on{color:var(--ink)}
.sb-bot{padding-bottom:8px}
.sb-avatar{width:28px;height:28px;border-radius:50%;background:var(--ink);color:var(--bg);display:flex;align-items:center;justify-content:center;font-size:9px;font-family:'JetBrains Mono',monospace;cursor:pointer}

.main{flex:1;height:100vh;position:relative;overflow:hidden}

/* TOP BAR — barely there */
.top{position:absolute;top:0;left:0;right:0;height:56px;display:flex;align-items:center;padding:0 48px;z-index:10}
.top-l{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.18em;color:var(--ink-ghost);text-transform:uppercase}
.top-r{margin-left:auto;display:flex;align-items:center;gap:24px}
.top-meta{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.12em;color:var(--ink-ghost);text-transform:uppercase}

/* IDLE STATE — the stage */
.stage{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 48px}
.kicker{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.32em;text-transform:uppercase;color:var(--ink-ghost);margin-bottom:32px;display:flex;align-items:center;gap:14px;opacity:0;animation:fu 1.2s ease 0.2s forwards}
.kicker::before,.kicker::after{content:'';width:24px;height:1px;background:var(--ink-ghost)}
.cipher-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:pulse 2.4s ease-in-out infinite}

.heading{font-family:'Fraunces',serif;font-size:clamp(56px,9vw,128px);font-weight:300;line-height:0.92;letter-spacing:-0.04em;text-align:center;max-width:900px;margin-bottom:14px;opacity:0;animation:fu 1.2s ease 0.4s forwards}
.heading em{font-style:italic;font-weight:200;color:var(--accent)}

.sub{font-size:14px;font-weight:300;color:var(--ink-soft);line-height:1.7;text-align:center;max-width:520px;margin-bottom:48px;opacity:0;animation:fu 1.2s ease 0.6s forwards;font-style:italic}

.input-frame{width:100%;max-width:680px;background:transparent;border:none;border-bottom:1px solid var(--ink);padding:16px 0;display:flex;align-items:center;gap:16px;opacity:0;animation:fu 1.2s ease 0.8s forwards}
.input-frame input{flex:1;background:transparent;border:none;outline:none;font-family:'Fraunces',serif;font-style:italic;font-size:24px;font-weight:300;color:var(--ink);font-weight:300}
.input-frame input::placeholder{color:var(--ink-ghost);font-style:italic}
.send-btn{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink);background:none;border:none;cursor:none;padding:8px 0;display:flex;align-items:center;gap:8px;transition:gap 0.3s}
.send-btn:hover{gap:14px}
.send-btn::after{content:'→';font-family:serif;font-size:16px}

.hint{margin-top:32px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.16em;color:var(--ink-ghost);text-transform:uppercase;opacity:0;animation:fu 1.2s ease 1s forwards}
.hint span{color:var(--accent);font-weight:500}

/* CORNER ACCENTS — barely there */
.corner{position:absolute;width:32px;height:32px;pointer-events:none}
.corner.tl{top:24px;left:80px;border-top:1px solid var(--ink-ghost);border-left:1px solid var(--ink-ghost)}
.corner.tr{top:24px;right:24px;border-top:1px solid var(--ink-ghost);border-right:1px solid var(--ink-ghost)}
.corner.bl{bottom:24px;left:80px;border-bottom:1px solid var(--ink-ghost);border-left:1px solid var(--ink-ghost)}
.corner.br{bottom:24px;right:24px;border-bottom:1px solid var(--ink-ghost);border-right:1px solid var(--ink-ghost)}

/* AMBIENT TEXTURE */
.grain{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:0.04;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");mix-blend-mode:multiply}

.threshold-line{position:absolute;left:80px;right:24px;top:50%;height:1px;background:linear-gradient(90deg,transparent,var(--ink-ghost) 30%,var(--ink-ghost) 70%,transparent);opacity:0.25;animation:breathe 8s ease-in-out infinite}

/* STATUS BAR — bottom */
.status{position:absolute;bottom:0;left:0;right:0;height:32px;display:flex;align-items:center;padding:0 48px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.14em;color:var(--ink-ghost);text-transform:uppercase;border-top:1px solid var(--line)}
.status-r{margin-left:auto;display:flex;gap:24px}

@keyframes fu{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.7)}}
@keyframes breathe{0%,100%{opacity:0.15}50%{opacity:0.35}}
</style>
</head>
<body>
<div id="cur"><div class="cur-dot"></div><div class="cur-ring"></div></div>
<div class="grain"></div>

<div class="shell">
  <div class="sb">
    <div class="sb-logo"></div>
    <div class="sb-nav">
      <div class="ni on">⌂</div>
      <div class="ni">⌕</div>
      <div class="ni">◇</div>
      <div class="ni">◈</div>
    </div>
    <div class="sb-bot"><div class="sb-avatar">SD</div></div>
  </div>

  <div class="main">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div class="threshold-line"></div>

    <div class="top">
      <div class="top-l">SOVREND · Atelier</div>
      <div class="top-r">
        <div class="top-meta">Operator</div>
        <div class="top-meta" style="color:var(--accent)">●  Cipher Ready</div>
      </div>
    </div>

    <div class="stage">
      <div class="kicker">
        <span class="cipher-dot"></span>
        Your architect is listening
      </div>
      <h1 class="heading">What are you<br>ready to <em>create?</em></h1>
      <p class="sub">"As you think, so shall you become."</p>
      <div class="input-frame">
        <input type="text" placeholder="Tell me what you see…" autofocus>
        <button class="send-btn">Architect</button>
      </div>
      <div class="hint">No code needed · About <span>60 seconds</span> · Press enter to begin</div>
    </div>

    <div class="status">
      <div>Powered by Claude Sonnet</div>
      <div class="status-r">
        <div>Builds: 24 / 50</div>
        <div>Tier: <span style="color:var(--accent)">Operator</span></div>
      </div>
    </div>
  </div>
</div>

<script>
var cur=document.getElementById('cur'),dot=cur.querySelector('.cur-dot'),ring=cur.querySelector('.cur-ring')
var mx=innerWidth/2,my=innerHeight/2,rx=mx,ry=my
document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px'})
function lerp(){rx+=(mx-rx)*0.12;ry+=(my-ry)*0.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(lerp)}
lerp()
document.querySelectorAll('button,input,.ni,.sb-avatar').forEach(function(el){
  el.addEventListener('mouseenter',function(){dot.style.transform='translate(-50%,-50%) scale(2.5)';ring.style.transform='translate(-50%,-50%) scale(0.5)';ring.style.borderColor='rgba(92,61,46,0.6)'})
  el.addEventListener('mouseleave',function(){dot.style.transform='translate(-50%,-50%) scale(1)';ring.style.transform='translate(-50%,-50%) scale(1)';ring.style.borderColor='rgba(26,26,26,0.2)'})
})
</script>
</body>
</html>
